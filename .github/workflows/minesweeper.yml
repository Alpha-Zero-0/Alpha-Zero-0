name: Minesweeper Game

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      action:
        description: 'Game action (new, show, help, leaderboard)'
        required: true
        default: 'show'
        type: choice
        options:
          - new
          - show
          - help
          - leaderboard

jobs:
  minesweeper:
    if: github.event_name == 'workflow_dispatch' || github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Parse comment
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            COMMENT="${{ github.event.comment.body }}"
            PLAYER="${{ github.event.comment.user.login }}"
            {
              echo 'comment<<EOF'
              echo "$COMMENT"
              echo 'EOF'
              echo "player=$PLAYER"
            } >> "$GITHUB_OUTPUT"
          else
            ACTION="${{ github.event.inputs.action }}"
            PLAYER="${{ github.actor }}"
            {
              echo 'comment<<EOF'
              echo "$ACTION"
              echo 'EOF'
              echo "player=$PLAYER"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Process game move
        id: game
        run: |
          cd ${{ github.workspace }}
          COMMENT="${{ steps.parse.outputs.comment }}"
          PLAYER="${{ steps.parse.outputs.player }}"
          
          # Extract action and coordinates from comment
          # Supported formats: "reveal 0 0", "reveal 0 0 0 1",
          # "flag 1 2", "flag 1 2 1 3", "new", "show", "help", "leaderboard"
          
          if [[ "$COMMENT" =~ ^reveal[[:space:]]+[0-9]+[[:space:]]+[0-9]+([[:space:]]+[0-9]+[[:space:]]+[0-9]+)*[[:space:]]*$ ]]; then
            read -ra ACTION_PARTS <<< "$COMMENT"
            python -m minesweeper.cli "${ACTION_PARTS[@]}" --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          elif [[ "$COMMENT" =~ ^flag[[:space:]]+[0-9]+[[:space:]]+[0-9]+([[:space:]]+[0-9]+[[:space:]]+[0-9]+)*[[:space:]]*$ ]]; then
            read -ra ACTION_PARTS <<< "$COMMENT"
            python -m minesweeper.cli "${ACTION_PARTS[@]}" --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          elif [[ "$COMMENT" =~ ^new ]]; then
            python -m minesweeper.cli new --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          elif [[ "$COMMENT" =~ ^help ]]; then
            python -m minesweeper.cli help --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          elif [[ "$COMMENT" =~ ^leaderboard ]]; then
            python -m minesweeper.cli leaderboard --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          else
            python -m minesweeper.cli show --state-file game_state.json --leaderboard-file minesweeper_leaderboard.json --player "$PLAYER" > game_output.txt 2>&1
          fi

          if [[ ! -s game_output.txt ]]; then
            echo "No game output was produced." > game_output.txt
          fi

      - name: Sync README leaderboard
        run: |
          cd ${{ github.workspace }}
          python -m minesweeper.sync_readme_leaderboard --readme README.md --leaderboard-file minesweeper_leaderboard.json

      - name: Commit game state
        run: |
          cd ${{ github.workspace }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Pull the latest changes to prevent push rejections
          git pull origin main --rebase
          
          git add README.md
          if [ -f game_state.json ]; then
            git add game_state.json
          fi
          if [ -f minesweeper_leaderboard.json ]; then
            git add minesweeper_leaderboard.json
          fi
          git diff --cached --exit-code || git commit -m "Update game state"
          git push

      - name: Comment with result
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('game_output.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Print output
        if: always()
        run: cat game_output.txt
